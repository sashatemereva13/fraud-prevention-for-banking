services:
  api:
    build: .
    container_name: fraud_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - redis
      - mongodb
      - neo4j
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MONGO_URI: mongodb://mongodb:27017
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}

  mongodb:
    image: mongo:7
    container_name: fraud_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: fraud_redis
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5
    container_name: fraud_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
      - ./docker/neo4j-init.cypher:/docker-entrypoint-initdb.d/init.cypher

volumes:
  mongo_data:
  neo4j_data:
